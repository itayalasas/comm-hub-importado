name: Deploy SendCraft to Azure Container Apps

on:
  push:
    branches:
      - main
      - dev

env:
  RESOURCE_GROUP: rg-sendcraft
  ACR_NAME: acrsendcraft
  IMAGE_NAME: sendcraft

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "CONTAINER_APP_NAME=ca-sendcraft" >> $GITHUB_ENV
          else
            echo "CONTAINER_APP_NAME=ca-sendcraft-test" >> $GITHUB_ENV
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
