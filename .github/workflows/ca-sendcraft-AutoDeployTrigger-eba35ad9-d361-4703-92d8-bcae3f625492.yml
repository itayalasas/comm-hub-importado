name: Trigger auto deployment for ca-sendcraft

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-sendcraft-AutoDeployTrigger-eba35ad9-d361-4703-92d8-bcae3f625492.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CASENDCRAFT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CASENDCRAFT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CASENDCRAFT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrsendcraft.azurecr.io
          registryUsername: ${{ secrets.CASENDCRAFT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CASENDCRAFT_REGISTRY_PASSWORD }}
          containerAppName: ca-sendcraft
          resourceGroup: rg-sendcraft
          imageToBuild: acrsendcraft.azurecr.io/ca-sendcraft:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


